name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Validate and create release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Build application
        run: pnpm run build

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable package version: $version" >&2
            exit 1
          fi
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag is new
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if git rev-parse --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "Release tag $RELEASE_TAG already exists. Update package.json before releasing." >&2
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes "## 发布说明

          本版本已通过 lint、类型检查和生产构建。以下变更记录由 GitHub 根据合并的拉取请求自动生成。" \
            --generate-notes
